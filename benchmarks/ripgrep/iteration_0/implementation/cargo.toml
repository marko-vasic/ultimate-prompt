[package]
name = "ripgrep"
version = "14.1.1"
edition = "2021"
default-run = "rg"

[[bin]]
name = "rg"
path = "src/main.rs"

[dependencies]
regex = "1"
clap = { version = "4", features = ["derive", "string"] }
ignore = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
memmap2 = "0.9"
encoding_rs = "0.8"
log = "0.4"
env_logger = "0.11"
base64 = "0.22"
globset = "0.4"
libc = "0.2"

[profile.release]
opt-level = 3
lto = true
